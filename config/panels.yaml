object_templates:
  minus_icon_template:
    asset: minus_icon
    size: [16, 16]
  plus_icon_template:
    asset: plus_icon
    size: [16, 16]
  settings_text:
    type: text
    font: kenvector_future
    font_size: 25
    color: [128, 128, 128]
  panel_text:
    type: text
    font: kenvector_future_thin
    font_size: 15
    color: Black
    text: ""
  volume_entry:
    type: button
    size: [150, 35]
    text: "%100"
    font_size: 25
    font: kenvector_future_thin
    text_color: Gray
    paths:
      default: grey8
  volume_button:
    type: button
    size: [36, 36]
    paths:
      default: blue_circle
      hover: yellow_circle
  go_back_template:
    type: button
    text: "GO BACK"
    selected_text: ""
    font_size: 28
    text_color: White
    selected_text_color: [128, 128, 128]
    paths:
      default: red_button
      hover: yellow_button
    font: kenvector_future
  bottom_panel_button:
    type: button
    size: [200, 60]
    selected_text: ""
    font_size: 27
    text_color: White
    selected_text_color: [128, 128, 128]
    font: kenvector_future
  menu_template:
    title_image: blue_button
    title_text_size: 30
    title_text_color: white
    title_font: kenvector_future
    panel_image: grey_panel
    button_size: [400, 60]
    button_image: blue_button
    button_hover_image: yellow_button
    button_text_size: 30
    button_text_color: [251, 254, 255]
    button_selected_text_color: [128, 128, 128]
    button_font: kenvector_future
panels:
  menu:
    objects:
      menu:
        extends: menu_template
        type: menu
        title: "2048 GAME"
        buttons: ["START", "SETTINGS", "DEVELOPER", "EXIT"]
      kenney_logo:
        position: [1751, 999]
        size: [144, 56]
        asset: kenney_logo

  settings:
    objects:
      menu:
        extends: menu_template
        type: menu
        title: "SETTINGS"
        buttons: ["display_settings", "audio_settings", "game_settings", "GO BACK"]

  game:
    objects:
      # Bottom panel
      game_panel:
        position: [ 0, 965 ]
        size: [ 1920, 100 ]
        asset: grey_panel
      selection_mode_button:
        type: button
        position: [ 340, 985 ]
        size: [ 60, 60 ]
        paths:
          on: green_button
          off: red_button
          default: green_button
          hover: yellow_button
      expand_button:
        extends: bottom_panel_button
        position: [560, 985]
        text: "EXPAND"
        paths:
          default: blue_button
          hover: yellow_button

      build_button:
        extends: bottom_panel_button
        position: [860, 985]
        text: "BUILD"
        paths:
          default: green_button
          hover: yellow_button
      next_age_button:
