        color: Green
        background_color: Black
        position: [ 1450, 995 ]
        text: ""
      selection_mode_button_image:
        position: [345, 990]
        size: [50, 50]
        asset: info_icon
      info_panel_building_image:
        position: [855, 360]
        size: [65, 89]
      info_panel:
        position: [CENTER, CENTER]
        size: [250, 400]
        asset: grey_panel
      sell_button:
        type: button
        position: [CENTER, 660]
        size: [210, 50]
        text: "SELL"
        selected_text: ""
        font_size: 28
        text_color: White
        selected_text_color: [128, 128, 128]
        paths:
          default: green_button
          hover: red_button
        font: kenvector_future
      close_button:
        type: button
        position: [1070, 335]
        size: [38, 38]
        paths:
          default: red_button
          hover: yellow_button
        font: kenvector_future
      level_text:
        extends: panel_text
        position: [930, 370]
      speed_text:
        extends: panel_text
        position: [930, 390]
      cooldown_text:
        extends: panel_text
        position: [930, 410]
      sell_price_text:
        extends: panel_text
        position: [930, 430]

  display_settings:
